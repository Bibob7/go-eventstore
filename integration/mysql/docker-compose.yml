services:
  mysql:
    image: mysql:9.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventstore_example
      MYSQL_USER: eventstore
      MYSQL_PASSWORD: eventstore
    ports:
      - "3306:3306"
    volumes:
      - ./sql/mysql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  mysql-volume: