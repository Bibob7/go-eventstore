version: 2

# This is a Go library — no binaries to build
builds:
  - skip: true

archives:
  - formats: [tar.gz]
    allow_different_binary_count: true

changelog:
  sort: asc
  use: github
  groups:
    - title: "Breaking Changes"
      regexp: '^.*!:.*$'
      order: 0
    - title: "New Features"
      regexp: '^.*feat(\(.+\))?!?:.*$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*fix(\(.+\))?!?:.*$'
      order: 2
    - title: "Performance"
      regexp: '^.*perf(\(.+\))?!?:.*$'
      order: 3
    - title: "Other Changes"
      order: 99
  filters:
    exclude:
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^docs(\(.+\))?:'
      - '^style(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - Merge pull request
      - Merge branch
